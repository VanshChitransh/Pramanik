services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - MOCK_API_BEARER_TOKEN=${MOCK_API_BEARER_TOKEN:-mock-bearer-token-123}
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
